    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.version-check.outputs.version }
      TARGETS: |
        x86_64-unknown-linux-gnu|linux-x86_64|x86_64|glibc
        x86_64-unknown-linux-musl|linux-x86_64-musl|x86_64|musl
        i686-unknown-linux-gnu|linux-x86|x86|glibc
        i686-unknown-linux-musl|linux-x86-musl|x86|musl
        armv7-unknown-linux-gnueabihf|linux-armv7|armv7|glibc
        armv7-unknown-linux-musleabihf|linux-armv7-musl|armv7|musl
        aarch64-unknown-linux-musl|linux-aarch64-musl|aarch64|musl
        aarch64-unknown-linux-gnu|linux-aarch64|aarch64|glibc
    steps:
      - uses: actions/checkout@v4

      # - name: Set up Rust for ${{ matrix.name }}
      #   uses: dtolnay/rust-toolchain@stable
      #   with:
      #     targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      # - name: Install musl tools (musl target only)
      #   if: matrix.target == 'x86_64-unknown-linux-musl'
      #   run: |
      #     sudo apt-get update
      #     sudo apt-get install -y musl-tools

      # - name: Build all
      #   env:
      #     SCCACHE_GHA_ENABLED: "true"
      #     RUSTC_WRAPPER: "sccache"
      #   run: cargo build --release --target ${{ matrix.target }}

      - name: Install cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby rpm libarchive-tools rename
          sudo gem install fpm --no-document

      - name: Build all
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          set -euo pipefail
          mkdir -p out

          while IFS='|' read -r TARGET NAME ARCH LIBC; do 
            cross build --release --target "$TARGET"

            cp "target/$TARGET/release/rusbmux" "rusbmux-$NAME"
            chmod +x "rusbmux-$NAME"

            BIN="rusbmux-$NAME"

            for fmt in deb rpm pacman apk; do 
              DEPS=""
              SYSTEMD=""
              SYSTEMD_PATH=""

              [ "$LIBC" = "glibc" ] && DEPS="--depends glibc --depends gcc-libs"

              if [ "$fmt" = "deb" ]; then
                SYSTEMD="--deb-systemd systemd/rusbmux.service --deb-systemd-enable"
              else
                SYSTEMD_PATH="systemd/rusbmux.service=/usr/lib/systemd/system/rusbmux.service"
              fi

              [ "$fmt" = "apk" ] && SYSTEMD="" && SYSTEMD_PATH=""

              fpm -t "$fmt" -s dir \
                -n rusbmux \
                -v "$VERSION" \
                --architecture "$ARCH" \
                --license "MIT OR Apache-2.0" \
                --maintainer "Abdullah Al-Banna <abdu.albanna@proton.me>" \
                --url "https://github.com/abdullah-albanna/rusbmux" \
                --description "A usbmuxd replacement in pure Rust" \
                --category net \
                --provides rusbmux --provides usbmuxd \
                --replaces usbmuxd --conflicts usbmuxd \
                $DEPS \
                $SYSTEMD \
                $BIN=/usr/bin/rusbmux \
                $SYSTEMD_PATH \
                README.md=/usr/share/doc/rusbmux/README.md \
                LICENSE-MIT=/usr/share/licenses/rusbmux/LICENSE-MIT \
                LICENSE-APACHE=/usr/share/licenses/rusbmux/LICENSE-APACHE \
                THIRD_PARTY_LICENSES.txt=/usr/share/licenses/rusbmux/THIRD_PARTY_LICENSES.txt
            done

            if [ "$LIBC" = "musl" ]; then
              rename 's/(\.pkg\.tar\.zst|\.deb|\.rpm|\.apk)$/-musl$1/' \
                *.deb *.rpm *.pkg.tar.zst *.apk 2>/dev/null || true
            fi

            mv *.deb *.rpm *.pkg.tar.zst *.apk out/ 2>/dev/null || true

          done <<< "$TARGETS"

