name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["Cargo.toml"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # check whether the version in Cargo.toml has
  # changed (push) or if this is a manual run.
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version & check if changed
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            PREV=$(git show HEAD~1:Cargo.toml 2>/dev/null \
              | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/' || echo "")
            if [ "$VERSION" != "$PREV" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  # Windows  –  rusbmux + USB driver + Inno Setup
  build-windows:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: D:\a\rusbmux\target
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for windows-x86_64
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Build rusbmux
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --no-default-features -F rusb,rusb-vendored,bin

      - name: Build USB driver
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --manifest-path windows/rusbmux-usb-win-driver/Cargo.toml

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.20.0

      - name: Install shawl
        run: cargo binstall shawl --no-confirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          ISCC.exe windows\rusbmux-setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: windows/dist/rusbmux-*.exe

  # Linux  –  glibc + musl (fully static)
  build-linux:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-amd64
            libc: glibc

          - target: x86_64-unknown-linux-musl
            name: linux-amd64-musl
            libc: musl

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Install musl tools (musl target only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename bins
        run: |
          cp "target/${{ matrix.target }}/release/rusbmux" "rusbmux-${{ matrix.name }}"
          chmod +x "rusbmux-${{ matrix.name }}"

      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby rpm libarchive-tools rename
          sudo gem install fpm --no-document

      - name: Package
        run: |
          set -e

          VERSION="${{ needs.version-check.outputs.version }}"
          BIN="target/${{ matrix.target }}/release/rusbmux"

          for fmt in deb rpm pacman apk; do

            DEPS=""
            SYSTEMD=""
            SYSTEMD_PATH=""

            if [ "${{ matrix.libc }}" = "glibc" ]; then
              DEPS="--depends glibc --depends gcc-libs"
            fi

            if [ "$fmt" = "deb" ]; then
              SYSTEMD="--deb-systemd systemd/rusbmux.service --deb-systemd-enable"
            else
              SYSTEMD_PATH="systemd/rusbmux.service=/usr/lib/systemd/system/rusbmux.service"
            fi

            if [ "$fmt" = "apk" ]; then
              SYSTEMD=""
              SYSTEMD_PATH=""
            fi

            fpm -t "$fmt" -s dir \
              -n rusbmux \
              -v "$VERSION" \
              --iteration 1 \
              --architecture x86_64 \
              --license "MIT OR Apache-2.0" \
              --maintainer "Abdullah Al-Banna <abdu.albanna@proton.me>" \
              --url "https://github.com/abdullah-albanna/rusbmux" \
              --description "A usbmuxd replacement in pure Rust" \
              --category net \
              --provides rusbmux \
              --provides usbmuxd \
              --replaces usbmuxd \
              --conflicts usbmuxd \
              $DEPS \
              $SYSTEMD \
              $BIN=/usr/bin/rusbmux \
              $SYSTEMD_PATH \
              README.md=/usr/share/doc/rusbmux/README.md \
              LICENSE-MIT=/usr/share/licenses/rusbmux/LICENSE-MIT \
              LICENSE-APACHE=/usr/share/licenses/rusbmux/LICENSE-APACHE \
              THIRD_PARTY_LICENSES.txt=/usr/share/licenses/rusbmux/THIRD_PARTY_LICENSES.txt

          done

      - name: Collect packages
        run: |
          mkdir -p out

          if [[ "${{ matrix.libc }}" = "musl" ]]; then 
            rename 's/(\.pkg\.tar\.zst|\.deb|\.rpm|\.apk)$/-musl$1/' *
          fi

          mv *.deb *.rpm *.pkg.tar.zst *.apk out/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: rusbmux-${{ matrix.name }}
          path: out/*

  # macOS  –  Intel  +  Apple Silicon
  build-macos:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: macos-x86_64
          - target: aarch64-apple-darwin
            name: macos-aarch64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename & upload binary
        run: |
          cp "target/${{ matrix.target }}/release/rusbmux" "rusbmux-${{ matrix.name }}"
          chmod +x "rusbmux-${{ matrix.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: rusbmux-${{ matrix.name }}
          path: rusbmux-${{ matrix.name }}

  # Release  –  collect artifacts + publish
  create-release:
    needs:
      - version-check
      - build-windows
      - build-linux
      - build-macos
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history for changelog

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git describe --tags --abbrev=0 2>/dev/null; then
            echo "Initial release" > release_body.md
            exit 0
          fi

          git cliff --config .github/cliff.toml --unreleased \
            --github-repo "${{ github.repository }}" > release_body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: artifacts/**/*
