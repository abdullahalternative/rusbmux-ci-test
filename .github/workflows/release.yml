name: Build and Release

on:
  workflow_dispatch:
  push:
    paths: ["Cargo.toml"]
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # check whether the version in Cargo.toml has
  # changed (push) or if this is a manual run.
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version & check if changed
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            PREV=$(git show HEAD~1:Cargo.toml 2>/dev/null \
              | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/' || echo "")
            if [ "$VERSION" != "$PREV" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  # Windows  –  rusbmux + USB driver + Inno Setup
  build-windows:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            name: win-x86_64
            arch: x86_64
            os: windows-latest

          # - target: aarch64-pc-windows-msvc
          #   name: win-arm64
          #   arch: arm64
          #   os: windows-11-arm

    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: ${{ matrix.os == 'windows-latest' && 'D:\a\rusbmux\target' || 'C:\a\rusbmux\target' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for windows-${{ matrix.arch }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Install needed crates
        uses: taiki-e/install-action@v2
        with:
          tool: |
            shawl
            cargo-about

      - name: Generate third party licenses file
        run: cargo about generate about.hbs -o THIRD_PARTY_LICENSES

      - name: Build rusbmux
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --no-default-features -F rusb,rusb-vendored,bin

      - name: Build USB driver
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --manifest-path windows/rusbmux-usb-win-driver/Cargo.toml

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          if ("${{ matrix.os }}" -eq "windows-11-arm") {
            ISCC.exe /dBuildARM64 windows\rusbmux-setup.iss
          } else {
            ISCC.exe windows\rusbmux-setup.iss
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.name }}
          path: windows/dist/rusbmux-*.exe

  # Linux  –  glibc + musl (fully static)
  build-linux:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            arch: x86_64
            libc: glibc

          - target: x86_64-unknown-linux-musl
            name: linux-x86_64-musl
            arch: x86_64
            libc: musl

          # ---------------------

          - target: i686-unknown-linux-gnu
            name: linux-x86
            arch: x86
            libc: glibc

          - target: i686-unknown-linux-musl
            name: linux-x86-musl
            arch: x86
            libc: musl

          # ---------------------

          - target: armv7-unknown-linux-gnueabihf
            name: linux-armv7
            arch: armv7
            libc: glibc

          - target: armv7-unknown-linux-musleabihf
            name: linux-armv7-musl
            arch: armv7
            libc: musl

          # ---------------------

          - target: aarch64-unknown-linux-musl
            name: linux-aarch64-musl
            arch: aarch64
            libc: musl

          - target: aarch64-unknown-linux-gnu
            name: linux-aarch64
            arch: aarch64
            libc: glibc

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Install needed crates
        uses: taiki-e/install-action@v2
        with:
          tool: |
            cargo-cross
            cargo-deb
            cargo-generate-rpm
            cargo-about

      - name: Generate third party licenses file
        run: cargo about generate about.hbs > THIRD_PARTY_LICENSES

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo cross build --release --target ${{ matrix.target }}

      - name: Package deb
        run: |
          if [ "${{ matrix.libc }}" = "musl" ]; then
            cargo deb --target ${{ matrix.target }} --no-build --variant musl -o out/
          else
            cargo deb --target ${{ matrix.target }} --no-build -o out/
          fi

      - name: Package rpm
        if: matrix.arch != 'x86' && matrix.arch != 'armv7'
        run: |
          if [ "${{ matrix.libc }}" = "musl" ]; then
            cargo generate-rpm --target ${{ matrix.target }} --variant musl -o out/
          else 
            cargo generate-rpm --target ${{ matrix.target }} -o out/
          fi

      - name: Package tarball
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          install -Dm 755 "target/${{ matrix.target }}/release/rusbmux" "out/rusbmux-$VERSION/usr/bin/rusbmux"
          install -Dm 644 systemd/rusbmux.service "out/rusbmux-$VERSION/usr/lib/systemd/system/rusbmux.service"
          install -Dm 644 README.md "out/rusbmux-$VERSION/usr/share/doc/rusbmux/README.md"
          install -Dm 644 LICENSE-MIT "out/rusbmux-$VERSION/usr/share/licenses/rusbmux/LICENSE-MIT"
          install -Dm 644 LICENSE-APACHE "out/rusbmux-$VERSION/usr/share/licenses/rusbmux/LICENSE-APACHE"
          install -Dm 644 THIRD_PARTY_LICENSES "out/rusbmux-$VERSION/usr/share/licenses/rusbmux/THIRD_PARTY_LICENSES"
          tar czf "out/rusbmux-${VERSION}-${{ matrix.arch }}.tar.gz" -C out "rusbmux-$VERSION"
          rm -rf "out/rusbmux-$VERSION"

      - name: Tag musl packages
        if: matrix.libc == 'musl'
        run: |
          cd out
          for f in *; do
            case "$f" in
              *.deb)         mv "$f" "${f%.deb}-musl.deb" 2>/dev/null || true ;;
              *.rpm)         mv "$f" "${f%.rpm}-musl.rpm" 2>/dev/null || true ;;
              *.tar.gz)         mv "$f" "${f%.tar.gz}-musl.tar.gz" 2>/dev/null || true ;;
            esac
          done

      - uses: actions/upload-artifact@v4
        with:
          name: rusbmux-${{ matrix.name }}
          path: out/*

  # macOS  –  Intel  +  Apple Silicon
  build-macos:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: macos-x86_64
            arch: x86_64
          - target: aarch64-apple-darwin
            name: macos-aarch64
            arch: aarch64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Install needed crates
        uses: taiki-e/install-action@v2
        with:
          tool: |
            cargo-about

      - name: Generate third party licenses file
        run: cargo about generate about.hbs > THIRD_PARTY_LICENSES

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package .pkg
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          mkdir -p pkgroot/usr/local/bin
          mkdir -p pkgroot/usr/local/share/doc/rusbmux
          mkdir -p pkgroot/Library/LaunchDaemons

          cp "target/${{ matrix.target }}/release/rusbmux" pkgroot/usr/local/bin/

          cp launchctl/com.abdullah-albanna.rusbmux.plist \
                pkgroot/Library/LaunchDaemons/

          cp README.md LICENSE-MIT LICENSE-APACHE THIRD_PARTY_LICENSES \
            pkgroot/usr/local/share/doc/rusbmux/

          pkgbuild --root pkgroot \
            --scripts launchctl/scripts/ \
            --identifier com.abdullah-albanna.rusbmux \
            --version "$VERSION" \
            --install-location / \
            "rusbmux-$VERSION-${{ matrix.arch }}.pkg"

      - uses: actions/upload-artifact@v4
        with:
          name: rusbmux-${{ matrix.name }}
          path: rusbmux-*.pkg

  # Release  –  collect artifacts + publish
  create-release:
    needs:
      - version-check
      - build-windows
      - build-linux
      - build-macos
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history for changelog

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git describe --tags --abbrev=0 2>/dev/null; then
            echo "Initial release" > release_body.md
            exit 0
          fi

          git cliff --config .github/cliff.toml --unreleased \
            --github-repo "${{ github.repository }}" > release_body.md

      - name: Prepend download table
        env:
          TAG: v${{ needs.version-check.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/$REPO/releases/download/$TAG"
          VER="${TAG#v}"

          DEB_X86_64="$BASE/rusbmux_${VER}_amd64.deb"
          DEB_X86_64_STATIC="$BASE/rusbmux_${VER}_amd64-musl.deb"

          RPM_X86_64="$BASE/rusbmux-${VER}-1.x86_64.rpm"
          RPM_X86_64_STATIC="$BASE/rusbmux-${VER}-1.x86_64-musl.rpm"

          TAR_X86_64="$BASE/rusbmux-${VER}-x86_64.tar.gz"
          TAR_X86_64_STATIC="$BASE/rusbmux-${VER}-x86_64-musl.tar.gz"

          MACOS_X86_64="$BASE/rusbmux-${VER}-x86_64.pkg"
          WINDOWS_X86_64="$BASE/rusbmux-${VER}-x86_64-setup.exe"

          DEB_AARCH64="$BASE/rusbmux_${VER}_arm64.deb"
          DEB_AARCH64_STATIC="$BASE/rusbmux_${VER}_arm64-musl.deb"

          RPM_AARCH64="$BASE/rusbmux-${VER}-1.aarch64.rpm"
          RPM_AARCH64_STATIC="$BASE/rusbmux-${VER}-1.aarch64-musl.rpm"

          TAR_AARCH64="$BASE/rusbmux-${VER}-aarch64.tar.gz"
          TAR_AARCH64_STATIC="$BASE/rusbmux-${VER}-aarch64-musl.tar.gz"

          MACOS_AARCH64="$BASE/rusbmux-${VER}-aarch64.pkg"

          DEB_ARMV7="$BASE/rusbmux_${VER}_armhf.deb"
          DEB_ARMV7_STATIC="$BASE/rusbmux_${VER}_armhf-musl.deb"

          TAR_ARMV7="$BASE/rusbmux-${VER}-armv7.tar.gz"
          TAR_ARMV7_STATIC="$BASE/rusbmux-${VER}-armv7-musl.tar.gz"

          DEB_X86="$BASE/rusbmux_${VER}_i386.deb"
          DEB_X86_STATIC="$BASE/rusbmux_${VER}_i386-musl.deb"

          TAR_X86="$BASE/rusbmux-${VER}-x86.tar.gz"
          TAR_X86_STATIC="$BASE/rusbmux-${VER}-x86-musl.tar.gz"

          table=$(cat <<EOF
          | Architecture    |            Debian/Ubuntu                                                            |                      Fedora                                                 |            Tarball                                                          |           macOS               |         Windows             |
          | --------------- | ----------------------------------------------------------------------------------- | --------------------------------------------------------------------------- | --------------------------------------------------------------------------- | ----------------------------- | --------------------------- |
          | x86-64 (64-bit) | [Download]($DEB_X86_64) <br> <br> [Download (Static)]($DEB_X86_64_STATIC)           | [Download]($RPM_X86_64) <br> <br> [Download (Static)]($RPM_X86_64_STATIC)   | [Download]($TAR_X86_64) <br> <br> [Download (Static)]($TAR_X86_64_STATIC)   | [Download]($MACOS_X86_64)     | [Download]($WINDOWS_X86_64) |
          | AArch64 (ARM64) | [Download]($DEB_AARCH64) <br> <br> [Download (Static)]($DEB_AARCH64_STATIC)         | [Download]($RPM_AARCH64) <br> <br> [Download (Static)]($RPM_AARCH64_STATIC) | [Download]($TAR_AARCH64) <br> <br> [Download (Static)]($TAR_AARCH64_STATIC) | [Download]($MACOS_AARCH64)    |                             |
          | ARMv7 (32-bit)  | [Download]($DEB_ARMV7) <br> <br> [Download (Static)]($DEB_ARMV7_STATIC)             |                                                                             | [Download]($TAR_ARMV7) <br> <br> [Download (Static)]($TAR_ARMV7_STATIC)     |                               |                             |
          | x86 (32-bit)    | [Download]($DEB_X86) <br> <br> [Download (Static)]($DEB_X86_STATIC)                 |                                                                             | [Download]($TAR_X86) <br> <br> [Download (Static)]($TAR_X86_STATIC)         |                               |                             |
          EOF
          )

          printf "%s\n\n%s\n" "$table" "$(cat release_body.md)" > release_body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: artifacts/**/*
