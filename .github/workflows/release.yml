name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["Cargo.toml"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # check whether the version in Cargo.toml has
  # changed (push) or if this is a manual run.
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version & check if changed
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            PREV=$(git show HEAD~1:Cargo.toml 2>/dev/null \
              | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/' || echo "")
            if [ "$VERSION" != "$PREV" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  # Windows  –  rusbmux + USB driver + Inno Setup
  build-windows:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            name: win-x86_64
            arch: x86_64
            os: windows-latest

          # - target: aarch64-pc-windows-msvc
          #   name: win-arm64
          #   arch: arm64
          #   os: windows-11-arm

    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_DIR: ${{ matrix.os == 'windows-latest' && 'D:\a\rusbmux\target' || 'C:\a\rusbmux\target' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for windows-${{ matrix.arch }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Build rusbmux
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --no-default-features -F rusb,rusb-vendored,bin

      - name: Build USB driver
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --manifest-path windows/rusbmux-usb-win-driver/Cargo.toml

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.20.0

      - name: Install shawl
        run: cargo binstall shawl --no-confirm

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          if ("${{ matrix.os }}" -eq "windows-11-arm") {
            ISCC.exe /dBuildARM64 windows\rusbmux-setup.iss
          } else {
            ISCC.exe windows\rusbmux-setup.iss
          }

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ matrix.name }}
          path: windows/dist/rusbmux-*.exe

  # Linux  –  glibc + musl (fully static)
  build-linux:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            arch: x86_64
            libc: glibc

          - target: x86_64-unknown-linux-musl
            name: linux-x86_64-musl
            arch: x86_64
            libc: musl

          # ---------------------

          - target: i686-unknown-linux-gnu
            name: linux-x86
            arch: x86
            libc: glibc

          - target: i686-unknown-linux-musl
            name: linux-x86-musl
            arch: x86
            libc: musl

          # ---------------------

          - target: armv7-unknown-linux-gnueabihf
            name: linux-armv7
            arch: armv7
            libc: glibc

          - target: armv7-unknown-linux-musleabihf
            name: linux-armv7-musl
            arch: armv7
            libc: musl

          # ---------------------

          - target: aarch64-unknown-linux-musl
            name: linux-aarch64-musl
            arch: aarch64
            libc: musl

          - target: aarch64-unknown-linux-gnu
            name: linux-aarch64
            arch: aarch64
            libc: glibc

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@v1.20.0

      - name: Install cargo-cross
        run: cargo binstall cargo-cross --no-confirm

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo cross build --release --target ${{ matrix.target }}

      - name: Install native packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm libarchive-tools zstd

      - name: Package
        run: |
          set -e

          VERSION="${{ needs.version-check.outputs.version }}"
          export BIN="target/${{ matrix.target }}/release/rusbmux"
          export VERSION
          export ARCH="${{ matrix.arch }}"
          export OUTDIR="out"

          for fmt in deb rpm pacman apk; do

            # alpine uses musl only
            [ "$fmt" = "apk" ] && [ "${{ matrix.libc }}" = "glibc" ] && continue

            # archlinux dropped x86
            [ "$fmt" = "pacman" ] && [ "${{ matrix.arch }}" = "x86" ] && continue

            # dropped since fedora 37
            [ "$fmt" = "rpm" ] && [ "${{ matrix.arch }}" = "x86" -o "${{ matrix.arch }}" = "armv7" ] && continue

            bash packaging/package.sh "$fmt"

          done

      - name: Tag musl packages
        if: matrix.libc == 'musl'
        run: |
          cd out
          for f in *; do
            case "$f" in
              *.deb)         mv "$f" "${f%.deb}-musl.deb" 2>/dev/null || true ;;
              *.rpm)         mv "$f" "${f%.rpm}-musl.rpm" 2>/dev/null || true ;;
              *.pkg.tar.zst) mv "$f" "${f%.pkg.tar.zst}-musl.pkg.tar.zst" 2>/dev/null || true ;;
              *.apk)         mv "$f" "${f%.apk}-musl.apk" 2>/dev/null || true ;;
            esac
          done

      - uses: actions/upload-artifact@v4
        with:
          name: rusbmux-${{ matrix.name }}
          path: out/*

  # macOS  –  Intel  +  Apple Silicon
  build-macos:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: macos-x86_64
          - target: aarch64-apple-darwin
            name: macos-aarch64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename & upload binary
        run: |
          cp "target/${{ matrix.target }}/release/rusbmux" "rusbmux-${{ matrix.name }}"
          chmod +x "rusbmux-${{ matrix.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: rusbmux-${{ matrix.name }}
          path: rusbmux-${{ matrix.name }}

  # Release  –  collect artifacts + publish
  create-release:
    needs:
      - version-check
      - build-windows
      - build-linux
      - build-macos
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history for changelog

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git describe --tags --abbrev=0 2>/dev/null; then
            echo "Initial release" > release_body.md
            exit 0
          fi

          git cliff --config .github/cliff.toml --unreleased \
            --github-repo "${{ github.repository }}" > release_body.md

      - name: Prepend download table
        env:
          TAG: v${{ needs.version-check.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          BASE="https://github.com/$REPO/releases/download/$TAG"
          VER="${TAG#v}"

          DEB_X86_64="$BASE/rusbmux_${VER}_amd64.deb"
          DEB_X86_64_STATIC="$BASE/rusbmux_${VER}_amd64-musl.deb"

          RPM_X86_64="$BASE/rusbmux-${VER}-1.x86_64.rpm"
          RPM_X86_64_STATIC="$BASE/rusbmux-${VER}-1.x86_64-musl.rpm"

          PKG_X86_64="$BASE/rusbmux-${VER}-1-x86_64.pkg.tar.zst"
          PKG_X86_64_STATIC="$BASE/rusbmux-${VER}-1-x86_64-musl.pkg.tar.zst"

          APK_X86_64="$BASE/rusbmux-${VER}-r1-x86_64-musl.apk"
          MACOS_X86_64="$BASE/rusbmux-macos-x86_64"
          WINDOWS_X86_64="$BASE/rusbmux-${VER}-x86_64-setup.exe"

          DEB_AARCH64="$BASE/rusbmux_${VER}_arm64.deb"
          DEB_AARCH64_STATIC="$BASE/rusbmux_${VER}_arm64-musl.deb"

          RPM_AARCH64="$BASE/rusbmux-${VER}-1.aarch64.rpm"
          RPM_AARCH64_STATIC="$BASE/rusbmux-${VER}-1.aarch64-musl.rpm"

          PKG_AARCH64="$BASE/rusbmux-${VER}-1-aarch64.pkg.tar.zst"
          PKG_AARCH64_STATIC="$BASE/rusbmux-${VER}-1-aarch64-musl.pkg.tar.zst"

          APK_AARCH64="$BASE/rusbmux-${VER}-r1-aarch64-musl.apk"
          MACOS_AARCH64="$BASE/rusbmux-macos-aarch64"
          WINDOWS_ARM64="$BASE/rusbmux-${VER}-arm64-setup.exe"

          DEB_ARMV7="$BASE/rusbmux_${VER}_armhf.deb"
          DEB_ARMV7_STATIC="$BASE/rusbmux_${VER}_armhf-musl.deb"

          PKG_ARMV7="$BASE/rusbmux-${VER}-1-armv7h.pkg.tar.zst"
          PKG_ARMV7_STATIC="$BASE/rusbmux-${VER}-1-armv7h-musl.pkg.tar.zst"

          APK_ARMV7="$BASE/rusbmux-${VER}-r1-armv7-musl.apk"

          DEB_X86="$BASE/rusbmux_${VER}_i386.deb"
          DEB_X86_STATIC="$BASE/rusbmux_${VER}_i386-musl.deb"

          APK_X86="$BASE/rusbmux-${VER}-r1-x86-musl.apk"

          table=$(cat <<EOF
          | Architecture    |            Debian/Ubuntu                                                            |                      Fedora                                                 |            ArchLinux                                                        |           Alpine                   |           macOS               |         Windows             |
          | --------------- | ----------------------------------------------------------------------------------- | --------------------------------------------------------------------------- | --------------------------------------------------------------------------- | ---------------------------------- | ----------------------------- | --------------------------- |
          | x86-64 (64-bit) | [Download]($DEB_X86_64) <br> <br> [Download (Static)]($DEB_X86_64_STATIC)           | [Download]($RPM_X86_64) <br> <br> [Download (Static)]($RPM_X86_64_STATIC)   | [Download]($PKG_X86_64) <br> <br> [Download (Static)]($PKG_X86_64_STATIC)   | [Download]($APK_X86_64)            | [Download]($MACOS_X86_64)     | [Download]($WINDOWS_X86_64) |
          | AArch64 (ARM64) | [Download]($DEB_AARCH64) <br> <br> [Download (Static)]($DEB_AARCH64_STATIC)         | [Download]($RPM_AARCH64) <br> <br> [Download (Static)]($RPM_AARCH64_STATIC) | [Download]($PKG_AARCH64) <br> <br> [Download (Static)]($PKG_AARCH64_STATIC) | [Download]($APK_AARCH64)           | [Download]($MACOS_AARCH64)    | [Download]($WINDOWS_ARM64)  |
          | ARMv7 (32-bit)  | [Download]($DEB_ARMV7) <br> <br> [Download (Static)]($DEB_ARMV7_STATIC)             |                                                                             | [Download]($PKG_ARMV7) <br> <br> [Download (Static)]($PKG_ARMV7_STATIC)     | [Download]($APK_ARMV7)             |                               |                             |
          | x86 (32-bit)    | [Download]($DEB_X86) <br> <br> [Download (Static)]($DEB_X86_STATIC)                 |                                                                             |                                                                             | [Download]($APK_X86)               |                               |                             |
          EOF
          )

          printf "%s\n\n%s\n" "$table" "$(cat release_body.md)" > release_body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: artifacts/**/*
