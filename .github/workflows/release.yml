name: Build and Release

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["Cargo.toml"]

env:
  CARGO_TERM_COLOR: always

jobs:
  # Check whether the version in Cargo.toml has
  # changed (push) or if this is a manual run.
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version & check if changed
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            PREV=$(git show HEAD~1:Cargo.toml 2>/dev/null \
              | grep '^version = ' | head -1 | sed 's/version = "\(.*\)"/\1/' || echo "")
            if [ "$VERSION" != "$PREV" ]; then
              echo "should_release=true" >> "$GITHUB_OUTPUT"
            else
              echo "should_release=false" >> "$GITHUB_OUTPUT"
            fi
          fi

  # Windows  –  rusbmux + USB driver + Inno Setup
  build-windows:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
          - name: windows-x86_64
    runs-on: windows-latest
    env:
      CARGO_TARGET_DIR: D:\a\rusbmux\target
    steps:
      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - uses: actions/checkout@v4

      - name: Build rusbmux
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: |
          cargo build --release --no-default-features -F rusb,rusb-vendored,bin --target ${{ matrix.target }}

      - name: Build USB driver
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --manifest-path windows/rusbmux-usb-win-driver/Cargo.toml

      - name: Install shawl
        env:
          RUSTFLAGS: "-C link-arg=/USECL:lld-link"
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo install shawl

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\rusbmux-setup.iss

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: windows/dist/rusbmux-*.exe

  # Linux  –  glibc  +  musl (fully static)
  build-linux:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            name: linux-amd64
          - target: x86_64-unknown-linux-musl
            name: linux-amd64-musl
    runs-on: ubuntu-latest
    steps:
      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - uses: actions/checkout@v4

      - name: Install musl tools (musl target only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename & upload binary
        run: |
          cp "target/${{ matrix.target }}/release/rusbmux" "rusbmux-${{ matrix.name }}"
          chmod +x "rusbmux-${{ matrix.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: rusbmux-${{ matrix.name }}
          path: rusbmux-${{ matrix.name }}

  # macOS  –  Intel  +  Apple Silicon
  build-macos:
    needs: version-check
    if: needs.version-check.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            name: macos-x86_64
          - target: aarch64-apple-darwin
            name: macos-aarch64
    runs-on: macos-latest
    steps:
      - name: Set up Rust for ${{ matrix.name }}
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.10
        with:
          version: "v0.10.0"

      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        env:
          SCCACHE_GHA_ENABLED: "true"
          RUSTC_WRAPPER: "sccache"
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename & upload binary
        run: |
          cp "target/${{ matrix.target }}/release/rusbmux" "rusbmux-${{ matrix.name }}"
          chmod +x "rusbmux-${{ matrix.name }}"

      - uses: actions/upload-artifact@v4
        with:
          name: rusbmux-${{ matrix.name }}
          path: rusbmux-${{ matrix.name }}

  # Release  –  collect artifacts + publish
  create-release:
    needs:
      - version-check
      - build-windows
      - build-linux
      - build-macos
    if: needs.version-check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history for changelog

      - uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git describe --tags --abbrev=0 2>/dev/null; then
            echo "Initial release" > release_body.md
            exit 0
          fi
          git cliff --config cliff.toml --unreleased \
            --github-repo "${{ github.repository }}" > release_body.md \
            || git cliff --config cliff.toml --unreleased > release_body.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version-check.outputs.version }}
          name: v${{ needs.version-check.outputs.version }}
          body_path: release_body.md
          draft: false
          prerelease: false
          files: artifacts/**/*
